services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://log_parser:log_parser@db:5432/log_parser?sslmode=disable
      DATA_DIR: /app/data
      MIGRATIONS_DIR: /app/migrations
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: log_parser
      POSTGRES_USER: log_parser
      POSTGRES_PASSWORD: log_parser
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U log_parser -d log_parser"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.20.20.0/24}
